name: integration tests
run-name: Integration tests for ${{ github.repository }}@${{ github.ref }}
on:
  push: {}
jobs:
  test-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - run: sudo mkdir -p /etc/apt/keyrings
      - run: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      - run: docker buildx create --use --driver=docker-container
      - name: Build test-cache
        uses: docker/build-push-action@v4
        with:
          cache-from: type=gha,scope=${{ github.ref }}:test-cache
          cache-to: type=gha,mode=max,scope=${{ github.ref }}:test-cache
          file: Dockerfile
          outputs: type=cacheonly
          tags: sigopt-server-test-cache
          push: false
  service:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - run: sudo mkdir -p /etc/apt/keyrings
      - run: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      - run: docker buildx create --use --driver=docker-container
      - name: Build test-runner
        uses: docker/build-push-action@v4
        with:
          cache-from: type=gha,scope=${{ github.ref }}:service
          cache-to: type=gha,mode=max,scope=${{ github.ref }}:service
          file: docker/images/test-runner/Dockerfile
          outputs: type=cacheonly
          tags: sigopt-server-test-runner
          push: false
      - name: Build zigopt
        uses: docker/build-push-action@v4
        with:
          cache-from: type=gha,scope=${{ github.ref }}:service
          cache-to: type=gha,mode=max,scope=${{ github.ref }}:service
          file: docker/images/zigopt/Dockerfile
          outputs: type=cacheonly
          tags: sigopt-server-zigopt
          push: false
      - run: ./ci/run_integration_test.sh test/integration/service/
      - name: Docker logs
        if: always()
        run: |
          set +e
          ./ci/compose.sh logs postgres
          ./ci/compose.sh logs redis
          ./ci/compose.sh logs minio
          ./ci/compose.sh logs smtp

